<!--
  Curriculum 3D graph viewer (self-contained, no libraries). v2
  Inject data by replacing __DATA__ with JSON: {groups, gcol, H, ageMin, ageMax,
  nodes:[{x,y,z,g,a,c,col,dm,t,tf,q,ev[]}], edges:[[dependentIdx,prereqIdx,hardFlag]]}.
  y in [0,H] maps to age; c in [0,1] drives dot size; ev = mastery-evidence bullets.
  Features: orbit/zoom/pan camera, age ruler, level-band slicing, subject toggles,
  search, lineage tracing on click, chronological "play the path" tour, batched edges,
  three morphing layouts (ordered columns / constellation nebula / waving tricolore flag),
  spin pause, reset view, auto-framing fit servo.
  Build your own: .claude/skills/build-curriculum-taxonomy/SKILL.md documents the
  full pipeline; scripts/inject_viewer_data.py injects a graphdata payload here.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>French Curriculum Graph</title>
<style>
  :root {
    --bg: #0A0C14; --panel: rgba(18, 21, 34, .92); --line: rgba(255,255,255,.09);
    --ink: #ECEDF4; --muted: #9CA0B4; --faint: #6A6E82; --accent: #8B8BF9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font: 14px/1.5 -apple-system, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }
  #wrap { position: fixed; inset: 0; }
  #stage {
    position: absolute; inset: 0 0 0 316px; cursor: grab; touch-action: none;
    background:
      radial-gradient(120% 62% at 50% 114%, rgba(96,106,255,.20), rgba(96,106,255,.06) 44%, transparent 68%),
      radial-gradient(70% 38% at 34% 116%, rgba(225,0,15,.05), transparent 60%),
      radial-gradient(70% 38% at 66% 116%, rgba(0,0,145,.09), transparent 60%);
  }
  #stage.drag { cursor: grabbing; }
  #cv { display: block; width: 100%; height: 100%; }

  .tricolore { position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 10; pointer-events: none;
    background: linear-gradient(90deg, #2E2EB8 0 34%, rgba(236,237,244,.55) 34% 66%, #C43A44 66%);
    opacity: .8; }
  .tricolore span { display: none; }

  /* ---------- left sidebar ---------- */
  #side { position: absolute; left: 0; top: 0; bottom: 0; width: 316px; z-index: 9;
    background: rgba(13,15,26,.95); border-right: 1px solid var(--line);
    backdrop-filter: blur(12px); overflow-y: auto; padding: 22px 18px 16px;
    display: flex; flex-direction: column; gap: 18px; transition: transform .22s; }
  #side .eyebrow { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--faint); font-weight: 700; margin: 0 0 6px; }
  #side h1 { margin: 0 0 7px; font-size: 19px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15; }
  #side .sub { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
  #side .sub b { color: var(--ink); }
  #side h4 { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint);
    font-weight: 700; margin: 0 0 8px; }
  .s-sec { border-top: 1px solid var(--line); padding-top: 14px; }
  #side .how ul { margin: 0; padding: 0; list-style: none; }
  #side .how li { font-size: 11.5px; color: var(--muted); margin-bottom: 5px; display: flex; gap: 8px; }
  #side .how .k { flex: none; min-width: 74px; color: var(--faint); font-size: 10.5px;
    font-family: ui-monospace, Menlo, monospace; padding-top: 1px; }
  .s-foot { margin-top: auto; padding-top: 12px; color: var(--faint); font-size: 10.5px; border-top: 1px solid var(--line); }
  .about-link { display: block; margin-top: 8px; border: 0; background: transparent; color: var(--accent);
    font: 700 10.5px/1.4 inherit; font-family: inherit; cursor: pointer; padding: 0; text-align: left; }
  .about-link:hover { text-decoration: underline; }
  #about { position: fixed; inset: 0; z-index: 40; background: rgba(5,6,12,.7); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 24px; }
  #about.on { display: flex; }
  #about .a-box { position: relative; width: min(680px, 94vw); max-height: 86vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 26px 30px; }
  #about h2 { margin: 0 0 14px; font-size: 20px; font-weight: 800; letter-spacing: -.015em; }
  #about .a-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
  #about .a-body p { margin: 0 0 10px; }
  #about .a-body b { color: var(--ink); }
  #about .a-close { position: absolute; top: 12px; right: 14px; border: 0; background: transparent;
    color: var(--faint); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  #about .a-close:hover { color: var(--ink); background: rgba(255,255,255,.07); }
  .s-langrow { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .s-lang { display: inline-flex; gap: 2px; flex: none; }
  .s-lang button { border: 1px solid transparent; background: transparent; color: var(--faint);
    font: 700 10px/1 inherit; font-family: inherit; letter-spacing: .08em; padding: 4px 6px;
    border-radius: 5px; cursor: pointer; }
  .s-lang button:hover { color: var(--ink); }
  .s-lang button[aria-pressed="true"] { color: var(--accent); border-color: var(--accent);
    background: rgba(139,139,249,.1); }
  .s-controls { display: flex; gap: 6px; }
  .s-controls button { flex: 1; border: 1px solid var(--line); background: rgba(255,255,255,.05);
    color: var(--ink); font: 600 11.5px/1 inherit; font-family: inherit; border-radius: 7px;
    padding: 8px 10px; cursor: pointer; }
  .s-controls button:hover { background: rgba(255,255,255,.1); }
  .s-controls button[aria-pressed="true"] { color: var(--accent); border-color: var(--accent);
    background: rgba(139,139,249,.12); }
  .s-controls button:focus-visible { outline: 2px solid var(--accent); }
  .s-modes button { padding: 8px 4px; font-size: 10.5px; white-space: nowrap; }

  #sideToggle { display: none; position: absolute; top: 12px; left: 12px; z-index: 11;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 8px;
    width: 34px; height: 34px; font-size: 15px; cursor: pointer; backdrop-filter: blur(8px); }
  @media (max-width: 900px) {
    #sideToggle { display: block; }
    #side { transform: translateX(-100%); width: min(316px, 86vw); box-shadow: 12px 0 40px rgba(0,0,0,.5); }
    body.side-open #side { transform: none; }
    #stage { left: 0 !important; }
  }

  /* ---------- age ruler (right edge) ---------- */
  #ruler { position: absolute; right: 0; top: 0; bottom: 0; width: 84px; z-index: 4; pointer-events: none; }
  #ruler .tick { position: absolute; right: 14px; display: flex; align-items: baseline; gap: 6px;
    justify-content: flex-end; transform: translateY(-50%); transition: opacity .2s; }
  #ruler .lv { font-size: 11.5px; font-weight: 700; color: var(--muted); letter-spacing: .05em; }
  #ruler .ag { font-size: 9.5px; color: var(--faint); }
  #ruler .ln { display: none; }

  /* ---------- search (in sidebar) ---------- */
  #q {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 8px;
    color: var(--ink); font: inherit; font-size: 12.5px; padding: 8px 11px; outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #hits { margin-top: 6px; background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; display: none; }
  #hits.on { display: block; }
  #hits button { display: flex; gap: 8px; align-items: center; width: 100%; text-align: left; border: 0;
    background: transparent; color: var(--ink); font: inherit; font-size: 12px; padding: 7px 10px; cursor: pointer; }
  #hits button:hover { background: rgba(255,255,255,.07); }
  #hits .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #hits .ha { margin-left: auto; color: var(--faint); font-size: 10.5px; }

  /* ---------- chips ---------- */
  .chip { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;
    background: rgba(255,255,255,.05); border: 1px solid transparent; border-radius: 7px; padding: 4px 9px;
    font-size: 11.5px; font-weight: 600; }
  .chip:hover { background: rgba(255,255,255,.09); }
  .chip .sw { width: 8px; height: 8px; border-radius: 50%; }
  .chip .ct { color: var(--faint); font-weight: 500; margin-left: auto; }
  .chip.off { opacity: .35; }
  .chip:focus-visible { outline: 2px solid var(--accent); }
  #bandchips { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  #chips { display: grid; grid-template-columns: 1fr; gap: 3px; }
  #chips .chip .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #tip { position: absolute; z-index: 8; max-width: 290px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 13px; pointer-events: none; opacity: 0; transition: opacity .1s;
    backdrop-filter: blur(10px); }
  #tip.on { opacity: 1; }
  #tip .top { display: flex; gap: 7px; align-items: center; margin-bottom: 3px; }
  #tip .sw { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  #tip .ts { font-size: 10.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }
  #tip .ttl { font-size: 14px; font-weight: 700; line-height: 1.25; }
  #tip .tf { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 1px; }
  #tip .q { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.45; }

  #card { position: absolute; top: 16px; right: 96px; bottom: 16px; width: min(360px, calc(100vw - 140px));
    z-index: 7; background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; overflow-y: auto; backdrop-filter: blur(12px);
    transform: translateX(16px); opacity: 0; pointer-events: none; transition: all .18s; }
  #card.on { transform: none; opacity: 1; pointer-events: auto; }
  #card .close, #card .back { position: absolute; top: 10px; border: 0; background: transparent; color: var(--faint);
    font-size: 17px; cursor: pointer; padding: 5px 8px; border-radius: 6px; }
  #card .close { right: 10px; }
  #card .back { left: 10px; display: none; }
  #card .back.on { display: block; }
  #card .close:hover, #card .back:hover { color: var(--ink); background: rgba(255,255,255,.07); }
  #card .top { display: flex; gap: 8px; align-items: center; margin: 4px 0 4px; }
  #card .sw { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  #card .cs { font-size: 10.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }
  #card .ctl { font-size: 19px; font-weight: 800; line-height: 1.2; letter-spacing: -.01em; }
  #card .ctf { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 2px; }
  #card .cq { font-size: 13px; color: var(--muted); margin-top: 9px; line-height: 1.5; }
  #card .stat { margin-top: 14px; padding: 11px 13px; background: rgba(255,255,255,.045); border-radius: 9px; }
  #card .n { font-size: 24px; font-weight: 800; }
  #card .u { font-size: 12px; color: var(--muted); margin-left: 6px; }
  #card .sub { font-size: 11.5px; color: var(--faint); margin-top: 3px; }
  #card .play { display: none; margin-top: 10px; width: 100%; border: 1px solid var(--accent);
    background: rgba(139,139,249,.12); color: var(--accent); font: 700 12.5px/1 inherit; font-family: inherit;
    border-radius: 7px; padding: 9px 12px; cursor: pointer; }
  #card .play:hover { background: rgba(139,139,249,.22); }
  #card .play.on { display: block; }
  #card h3 { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint);
    margin: 16px 0 7px; font-weight: 700; }
  #card h3 .k { color: var(--muted); margin-left: 5px; }
  #card .ev { margin: 0; padding-left: 17px; display: none; }
  #card .ev li { font-size: 12px; color: var(--muted); margin-bottom: 4px; line-height: 1.45; }
  .row { display: flex; gap: 8px; align-items: center; width: 100%; text-align: left; border: 0;
    background: rgba(255,255,255,.035); color: var(--ink); font: inherit; font-size: 12.5px;
    padding: 7px 10px; border-radius: 7px; cursor: pointer; margin-bottom: 4px; }
  .row:hover { background: rgba(255,255,255,.09); }
  .rdot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .rt { flex: 1; line-height: 1.3; }
  .ra { color: var(--faint); font-size: 11px; flex: none; }
  .empty { color: var(--faint); font-size: 12px; padding: 4px 2px; }

  /* ---------- play pill ---------- */
  #playpill { position: absolute; bottom: 22px; left: calc(50% + 158px); transform: translate(-50%, 8px); z-index: 8;
    display: flex; gap: 10px; align-items: center; background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 9px 8px 16px; backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none; transition: all .2s; max-width: min(560px, 86vw); }
  #playpill.on { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  @media (max-width: 900px) { #playpill { left: 50%; } #card { right: 12px; } }
  #playpill .pk { font-size: 11.5px; color: var(--faint); flex: none; }
  #playpill .pt { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #playpill .pa { font-size: 11.5px; color: var(--muted); flex: none; }
  #playpill .pb, #playpill .stop { border: 0; background: rgba(255,255,255,.08); color: var(--ink);
    border-radius: 999px; width: 28px; height: 28px; cursor: pointer; font-size: 13px; flex: none;
    display: inline-flex; align-items: center; justify-content: center; }
  #playpill .pb:hover, #playpill .stop:hover { background: rgba(255,255,255,.18); }
  #playpill .toggle { background: rgba(139,139,249,.22); color: var(--accent); font-size: 12px; }

  /* mobile GPUs pay dearly for backdrop blur over an animating canvas */
  @media (pointer: coarse) {
    #side, #sideToggle, #about, #tip, #card, #playpill { backdrop-filter: none; }
  }
  @media (max-width: 720px) { #ruler { display: none; } }
</style>
</head>
<body>
<div id="wrap">
  <div class="tricolore"><span></span><span></span><span></span></div>
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="ruler"></div>
  <button id="sideToggle" aria-label="Toggle panel">&#9776;</button>

  <aside id="side">
    <div class="s-head">
      <div class="s-langrow">
        <p class="eyebrow">Programmes officiels · rentrée 2025</p>
        <span class="s-lang"><button data-l="en">EN</button><button data-l="fr">FR</button></span>
      </div>
      <h1 data-i18n="title">The French Curriculum as a Living Graph</h1>
      <p class="sub" id="subLine"></p>
    </div>

    <div class="s-search">
      <input id="q" type="search" placeholder="Search a topic (EN / FR)&hellip;" autocomplete="off" aria-label="Search topics">
      <div id="hits"></div>
    </div>

    <div class="s-controls">
      <button id="spinBtn" aria-pressed="false">&#10074;&#10074;&nbsp; Pause spin</button>
      <button id="resetBtn">Reset view</button>
    </div>
    <div class="s-controls s-modes">
      <button class="mode" data-m="0" aria-pressed="true">&#11041; Ordered</button>
      <button class="mode" data-m="1">&#10024; Constellation</button>
      <button class="mode" data-m="2">&#127467;&#127479; Flag</button>
    </div>

    <section class="s-sec">
      <h4 data-i18n="levels">Levels · click to slice</h4>
      <div id="bandchips"></div>
    </section>

    <section class="s-sec">
      <h4 data-i18n="families">Subject families · click to toggle</h4>
      <div id="chips"></div>
    </section>

    <section class="s-sec how">
      <h4 data-i18n="how">How to explore</h4>
      <ul>
        <li><span class="k" data-i18n="k1"></span><span data-i18n="v1"></span></li>
        <li><span class="k" data-i18n="k2"></span><span data-i18n="v2"></span></li>
        <li><span class="k" data-i18n="k3"></span><span data-i18n="v3"></span></li>
        <li><span class="k" data-i18n="k4"></span><span data-i18n="v4"></span></li>
        <li><span class="k" data-i18n="k5"></span><span data-i18n="v5"></span></li>
        <li><span class="k" data-i18n="k6"></span><span data-i18n="v6"></span></li>
      </ul>
    </section>

    <div class="s-foot">
      <span data-i18n="foot"></span>
      <button class="about-link" id="aboutBtn" data-i18n="aboutBtn"></button>
    </div>
  </aside>

  <div id="about" role="dialog" aria-modal="true">
    <div class="a-box">
      <button class="a-close" aria-label="Close">&times;</button>
      <h2 data-i18n="aboutTitle"></h2>
      <div class="a-body" id="aboutBody"></div>
    </div>
  </div>

  <div id="tip" role="presentation">
    <div class="top"><span class="sw"></span><span class="ts"></span></div>
    <div class="ttl"></div><div class="tf"></div><div class="q"></div>
  </div>

  <div id="card">
    <button class="back" aria-label="Back">&#8592;</button>
    <button class="close" aria-label="Close">&times;</button>
    <div class="top"><span class="sw"></span><span class="cs"></span></div>
    <div class="ctl"></div><div class="ctf"></div><div class="cq"></div>
    <div class="stat">
      <span class="n mono"></span><span class="u"></span>
      <div class="sub"></div>
      <button class="play">&#9654;&nbsp; Play the path</button>
    </div>
    <h3 class="sec-ev" style="display:none"><span data-i18n="mastery">How mastery shows</span></h3>
    <ul class="ev"></ul>
    <h3 class="sec-pre"><span data-i18n="builds">Builds on</span> <span class="k mono"></span></h3>
    <div class="rows-pre"></div>
    <h3 class="sec-next"><span data-i18n="unlocks">Unlocks</span> <span class="k mono"></span></h3>
    <div class="rows-next"></div>
  </div>

  <div id="playpill">
    <span class="pk mono"></span><span class="pt"></span><span class="pa mono"></span>
    <button class="pb prev" aria-label="Previous step">&#171;</button>
    <button class="pb toggle" aria-label="Pause or resume">&#10074;&#10074;</button>
    <button class="pb next" aria-label="Next step">&#187;</button>
    <button class="stop" aria-label="Stop">&times;</button>
  </div>

</div>

<script id="graphdata" type="application/json">__DATA__</script>
<script>
(function(){
  "use strict";
  const DATA=JSON.parse(document.getElementById('graphdata').textContent);
  const GROUPS=DATA.groups, N=DATA.nodes, E=DATA.edges, H=DATA.H;
  const MID=String.fromCharCode(183);
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // ---------- i18n ----------
  const I18N={
    en:{title:'The French Curriculum as a Living Graph',
      sub:(n,e)=>`<b class="mono">${n}</b> micro-topics ${MID} <b class="mono">${e}</b> prerequisite links, PS → Terminale. Height is age. Click any dot to trace everything a learner must master before it.`,
      search:'Search a topic (EN / FR)…',
      pause:'❚❚  Pause spin',resume:'▶  Resume spin',reset:'Reset view',
      m0:'⬡ Ordered',m1:'✨ Constellation',m2:'🇫🇷 Flag',
      levels:'Levels · click to slice',families:'Subject families · click to toggle',
      how:'How to explore',
      k1:'drag',v1:'orbit the graph',k2:'wheel · pinch',v2:'zoom',k3:'right-drag',v3:'pan',
      k4:'click a dot',v4:'trace its full learning lineage',
      k5:'dbl-click',v5:'reset the view / refit filters',
      k6:'space · ← →',v6:'pause and step during Play the path',
      foot:'Distilled from the official programmes in force at rentrée 2025 (Licence Ouverte, Ministère de l’Éducation nationale).',
      play:'▶  Play the path',mastery:'How mastery shows',builds:'Builds on',unlocks:'Unlocks',
      pre1:'prerequisite in total',preN:'prerequisites in total',
      sub1:'Everything a learner must master before this one, traced all the way back.',
      sub0:'A starting point. Nothing has to come before it.',
      empty:'nothing yet',age:'age',
      aboutBtn:'How this was made →',aboutTitle:'How this was made',
      aboutHtml:'<p><b>Sources.</b> 127 official documents (programmes, attendus de fin d’année, socle commun) were catalogued from éduscol, education.gouv.fr and the Bulletin officiel, every reference independently verified, and the set pinned to the texts in force at rentrée 2025 for the voie générale, PS to Terminale.</p>'+
      '<p><b>Standards.</b> Fleets of AI agents extracted <b>14,549 requirements verbatim</b> from 91 source documents. Every extraction unit was adversarially re-checked against the source pages for fidelity and completeness (229 pass, 15 repaired, 0 failed).</p>'+
      '<p><b>Micro-topics.</b> The standards were distilled into <b>6,051 micro-topics</b>, one teachable idea each, with English and French names, age ranges and mastery evidence. Duplicates were removed through an embedding gate, judge panels and per-subject critics, with exact accounting of every standard covered or discarded.</p>'+
      '<p><b>The graph.</b> 10,880 prerequisite edges were proposed under strict rules, 272 adversarial panels rejected the weak ones, and deterministic code enforced acyclicity: <b>10,050 edges</b>, a verified DAG. 845 parent-friendly cluster summaries complete the dataset.</p>'+
      '<p><b>Method in one line:</b> agents propose, code disposes. All judgment ran in small verifiable units; all global constraints (coverage, deduplication, acyclicity, schema validity) were enforced by programs, not prose.</p>'+
      '<p>Roughly 1,700 agent runs over three days. The full account lives in <b>METHODOLOGY.md</b> next to this file. Official text: Licence Ouverte 2.0, Ministère de l’Éducation nationale. Visualization concept: Marble’s os-taxonomy.</p>'},
    fr:{title:'Le programme scolaire français en graphe vivant',
      sub:(n,e)=>`<b class="mono">${n}</b> micro-notions ${MID} <b class="mono">${e}</b> liens de prérequis, de la PS à la Terminale. La hauteur correspond à l'âge. Cliquez sur un point pour remonter tout ce qu'un élève doit maîtriser avant.`,

      aboutHtml:'<p><b>Sources.</b> 127 documents officiels (programmes, attendus de fin d’année, socle commun) ont été recensés depuis éduscol, education.gouv.fr et le Bulletin officiel, chaque référence vérifiée indépendamment, et l’ensemble figé sur les textes en vigueur à la rentrée 2025 pour la voie générale, de la PS à la Terminale.</p>'+

    card.querySelector('.u').textContent=cnt===1?T('pre1'):T('preN');
    card.querySelector('.sub').textContent=cnt>0?T('sub1'):T('sub0');
    card.querySelector('.play').classList.toggle('on', cnt>0);
    const evEl=card.querySelector('.ev'), evH=card.querySelector('.sec-ev');
    evEl.innerHTML='';
    if(n.ev&&n.ev.length){
      n.ev.forEach(b=>{const li=document.createElement('li');li.textContent=b;evEl.appendChild(li);});
      evEl.style.display='block'; evH.style.display='block';
    } else { evEl.style.display='none'; evH.style.display='none'; }
    const pre=directPre[i], nxt=directNext[i];
    card.querySelector('.sec-pre .k').textContent=pre.length?pre.length:'';
    card.querySelector('.sec-next .k').textContent=nxt.length?nxt.length:'';
    fillRows(card.querySelector('.rows-pre'), pre);
    fillRows(card.querySelector('.rows-next'), nxt.slice(0,40));
    card.querySelector('.back').classList.toggle('on', hist.length>0);
    card.scrollTop=0;
    card.classList.add('on');
  }

  // ---------- play the path ----------
  const pill=document.getElementById('playpill');
  let playing=false, playPaused=false, playOrder=[], playSet=null, playIdx=0, playClock=0, playStep=900, playHold=0;
  const PLAY_ZOOM=2.1;
  function buildPlayOrder(){
    const inLin=lineage.nodes;
    const indeg=new Map();
    inLin.forEach(u=>{ let d=0; for(const p of directPre[u]) if(inLin.has(p)) d++; indeg.set(u,d); });
    const avail=[...inLin].filter(u=>indeg.get(u)===0);
    const out=[];
    while(avail.length){
      avail.sort((a,b)=>N[a].a-N[b].a||N[a].y-N[b].y);
      const u=avail.shift(); out.push(u);
      for(const d of directNext[u]) if(inLin.has(d)){
        indeg.set(d,indeg.get(d)-1);
        if(indeg.get(d)===0)avail.push(d);
      }
    }
    return out;
  }
  function focusPlay(i){
    focusNode(i, Math.max(PLAY_ZOOM, zoom>PLAY_ZOOM?zoom:PLAY_ZOOM));
  }
  function setStep(k){
    k=Math.max(1,Math.min(playOrder.length,k));
    playIdx=k; playClock=0; playHold=0;
    playSet=new Set(playOrder.slice(0,k));
    const u=playOrder[k-1];
    pill.querySelector('.pk').textContent=k+'/'+playOrder.length;
    pill.querySelector('.pt').textContent=nameOf(N[u]);
    pill.querySelector('.pa').textContent=T('age')+' '+N[u].a;
    focusPlay(u);
  }
  function syncToggle(){
    pill.querySelector('.toggle').innerHTML=playPaused?'&#9654;':'&#10074;&#10074;';
  }
  function startPlay(){
    if(selected<0||!lineage||lineage.nodes.size<2)return;
    playOrder=buildPlayOrder();
    playSet=new Set(); playClock=0; playHold=0; playPaused=false;
    playStep=Math.max(650,Math.min(1400,26000/playOrder.length));
    playing=true; hideTip(); syncToggle();
    pill.classList.add('on');
    setStep(1);
  }
  function stopPlay(){
    if(!playing&&!pill.classList.contains('on'))return;
    playing=false; playPaused=false; playSet=null; pill.classList.remove('on');
    if(selected>=0){focusNode(selected);zoomTarget=1.25;}
  }
  card.querySelector('.play').addEventListener('click',startPlay);
  pill.querySelector('.stop').addEventListener('click',stopPlay);
  pill.querySelector('.toggle').addEventListener('click',()=>{playPaused=!playPaused;playClock=0;syncToggle();});
  pill.querySelector('.prev').addEventListener('click',()=>{playPaused=true;syncToggle();setStep(playIdx-1);});
  pill.querySelector('.next').addEventListener('click',()=>{playPaused=true;syncToggle();setStep(playIdx+1);});
  window.addEventListener('keydown',e=>{
    if(!playing||e.target===qEl)return;
    if(e.key===' '){e.preventDefault();playPaused=!playPaused;playClock=0;syncToggle();}
    else if(e.key==='ArrowRight'){e.preventDefault();playPaused=true;syncToggle();setStep(playIdx+1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();playPaused=true;syncToggle();setStep(playIdx-1);}
    else if(e.key==='Escape'){stopPlay();}
  });

  // ---------- legend + band chips ----------
  const groupChips=[], bandChips=[];
  function syncChip(el,on){
    el.classList.toggle('off',!on); el.setAttribute('aria-pressed',on?'true':'false');
  }
  function makeChip(parent,label,count,color,onToggle){
    const el=document.createElement('div');el.className='chip';el.tabIndex=0;
    el.setAttribute('role','button');el.setAttribute('aria-pressed','true');
    el.innerHTML=(color?'<span class="sw" style="background:'+color+'"></span>':'')+
      '<span class="nm">'+esc(label)+'</span><span class="ct mono">'+count+'</span>';
    const t=()=>onToggle(el);
    el.addEventListener('click',t);
    el.addEventListener('keydown',ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();t();}});
    parent.appendChild(el);
    return el;
  }
  const chips=document.getElementById('chips');
  const counts=GROUPS.map(()=>0);N.forEach(n=>counts[n.g]++);
  GROUPS.forEach((s,i)=>{
    groupChips[i]=makeChip(chips,s,counts[i],GCOL[i],el=>{
      if(active.has(i)){active.delete(i);syncChip(el,false);}
      else{active.add(i);syncChip(el,true);}
      frameVisible();
    });
  });
  const bandsEl=document.getElementById('bandchips');
  const bcnt=BANDS.map(()=>0);nb.forEach(b=>bcnt[b]++);
  BANDS.forEach((b,i)=>{
    bandChips[i]=makeChip(bandsEl,b[0],bcnt[i],null,el=>{
      if(bandsOn.has(i)){bandsOn.delete(i);syncChip(el,false);}
      else{bandsOn.add(i);syncChip(el,true);}
      frameVisible();
    });
  });

  // ---------- age ruler ----------
  const LEVELS=[['PS',3],['CP',6],['CM1',9],['5e',12],['2nde',15],['Tle',17]];
  const ruler=document.getElementById('ruler');
  const tickEls=LEVELS.map(([lv,a])=>{
    const el=document.createElement('div');el.className='tick';
    el.innerHTML='<span class="ln"></span><span class="lv">'+lv+'</span><span class="ag mono">'+a+'y</span>';
    ruler.appendChild(el);
    return {el, py:(a-3)/15*H - H/2};
  });
  const tickY=new Float32Array(tickEls.length);
  function updateRuler(){
    if(VW<=720)return; // ruler is display:none on narrow screens
    for(let k=0;k<tickEls.length;k++){
      const t=tickEls[k];
      const y2=t.py*CT, z2=t.py*ST;
      const pf=FOV/Math.max(140,FOV+z2*SC*1.6);
      const sy=CYY+panY-y2*SC*pf;
      tickY[k]=sy;
      const on=layoutMode!==2&&sy>34&&sy<VH-30;
      t.el.style.opacity=on?1:0;
      if(on)t.el.style.top=sy+'px';
    }
  }
  function drawRulerLines(){
    if(layoutMode===2)return;   // the age scale has no meaning on the flag
    // faint horizontal guides tying the age scale to the structure
    ctx.strokeStyle='rgba(150,165,205,.055)';
    ctx.lineWidth=1;
    ctx.setLineDash([2,6]);
    ctx.beginPath();
    for(let k=0;k<tickY.length;k++){
      const sy=tickY[k];
      if(sy<34||sy>VH-30)continue;
      ctx.moveTo(16,sy);ctx.lineTo(VW-88,sy);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ---------- search ----------
  const qEl=document.getElementById('q'), hits=document.getElementById('hits');
  const strip=s=>s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
  const HAY=N.map(n=>strip(n.t+' '+n.tf+' '+n.dm));
  qEl.addEventListener('input',()=>{
    const q=strip(qEl.value.trim());
    hits.innerHTML='';
    if(q.length<2){hits.classList.remove('on');return;}
    const terms=q.split(/\s+/);
    const found=[];
    for(let i=0;i<N.length&&found.length<8;i++){
      if(terms.every(t=>HAY[i].includes(t)))found.push(i);
    }
    found.forEach(i=>{
      const b=document.createElement('button');
      b.innerHTML='<span class="dot" style="background:'+N[i].col+'"></span>'+esc(nameOf(N[i]))+
        '<span class="ha mono">'+T('age')+' '+N[i].a+'</span>';
      b.addEventListener('click',()=>{selectNode(i,true);hits.classList.remove('on');qEl.value='';});
      hits.appendChild(b);
    });
    hits.classList.toggle('on',found.length>0);
  });
  qEl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){const b=hits.querySelector('button');if(b)b.click();}
    if(e.key==='Escape'){hits.classList.remove('on');qEl.blur();}
  });

  function hexN(h){const v=parseInt(h.slice(1),16);return[v>>16,(v>>8)&255,v&255];}
  const BASE=N.map(n=>hexN(n.col));
  const FLAGC=N.map(n=>{           // bleu · blanc · rouge by flag position
    const f=(n._fx+FW/2)/FW;
    return f<1/3?[46,82,224]:f<2/3?[237,238,245]:[229,72,84];
  });
  const CUR=BASE.map(c=>c.slice());
  const SNAP=BASE.map(c=>c.slice());
  const CURS=CUR.map(c=>c.join(','));
  const order=N.map((_,i)=>i);
  let sortRot=1e9,sortTilt=0,sortZoom=1,sortAt=0;

  // dot sprites: a circle+outline pre-rendered per (color, radius step);
  // one scaled drawImage per node beats two vector paths and a per-node
  // style string. Colors are only stable outside morphs, so the draw loop
  // falls back to paths while a morph is in flight.
  const SPRITES=new Map();
  function sprite(key,R){
    const k=key+'|'+R;
    let s=SPRITES.get(k);
    if(!s){
      s=document.createElement('canvas');
      s.width=s.height=Math.ceil((R+2)*2*DPR);
      const c=s.getContext('2d');
      c.scale(DPR,DPR);
      c.beginPath();c.arc(R+2,R+2,R,0,6.2832);
      c.fillStyle='rgb('+key+')';c.fill();
      c.lineWidth=1;c.strokeStyle='rgba(8,10,18,.5)';c.stroke();
      SPRITES.set(k,s);
    }
    return s;
  }

  // edge batches: (soft/hard | dimmed) x depth quartile -> flat coord arrays
  const NB_BATCH=8;
  const batches=Array.from({length:NB_BATCH},()=>[]);
  const DEPTH_MID=[0.8,0.92,1.02,1.12];

  function draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,VW,VH);
    project();
    updateRuler();
    drawRulerLines();
    const hasSel=!!lineage;

    for(let b=0;b<NB_BATCH;b++)batches[b].length=0;
    const linEdges=[];
    for(let k=0;k<E.length;k++){
      const e=E[k],a=e[0],b=e[1];
      if(!vis(a)||!vis(b))continue;
      if(!reduce&&(N[a].appear>grow||N[b].appear>grow))continue;
      if(offscreen(a)&&offscreen(b))continue;
      if(hasSel&&lineage.edges.has(k)){linEdges.push(k);continue;}
      if(COARSE&&!e[2]&&(k&1))continue; // phones: every other soft thread
      const d=(P[a*3+2]+P[b*3+2])/2;
      const dq=d<0.86?0:d<0.98?1:d<1.08?2:3;
      batches[(hasSel?0:(e[2]?4:0))+dq].push(P[a*3],P[a*3+1],P[b*3],P[b*3+1]);
    }
    ctx.lineWidth=1;
    for(let b=0;b<NB_BATCH;b++){
      const arr=batches[b];
      if(!arr.length)continue;
      const dq=b%4, hard=b>=4;
      const alpha=hasSel?0.03*DEPTH_MID[dq]:(hard?0.09:0.045)*DEPTH_MID[dq];
      ctx.strokeStyle='rgba(150,165,205,'+alpha+')';
      ctx.beginPath();
      for(let j=0;j<arr.length;j+=4){ctx.moveTo(arr[j],arr[j+1]);ctx.lineTo(arr[j+2],arr[j+3]);}
      ctx.stroke();
    }
    for(const k of linEdges){
      const e=E[k],a=e[0],b=e[1];
      const revealed=!playSet||(playSet.has(a)&&playSet.has(b));
      ctx.strokeStyle='rgba('+CURS[b]+','+(revealed?.75:.06)+')';
      ctx.lineWidth=revealed?1.6:1;
      ctx.beginPath();
      ctx.moveTo(P[a*3],P[a*3+1]);ctx.lineTo(P[b*3],P[b*3+1]);
      ctx.stroke();
    }

    // painter's order barely changes frame to frame: re-sort only after real
    // camera/layout movement (or periodically while the flag cloth waves)
    const nowMs=performance.now();
    if(morphT<1||Math.abs(rotY-sortRot)>0.02||Math.abs(tilt-sortTilt)>0.02||
       Math.abs(zoom-sortZoom)>0.03*sortZoom||(layoutMode===2&&nowMs-sortAt>300)){
      order.sort((a,b)=>P[a*3+2]-P[b*3+2]);
      sortRot=rotY;sortTilt=tilt;sortZoom=zoom;sortAt=nowMs;
    }
    for(const i of order){
      const n=N[i];
      if(!vis(i)||offscreen(i))continue;
      if(!reduce&&n.appear>grow)continue;
      const inLin=hasSel?lineage.nodes.has(i):true;
      const isFocus=(i===selected)||(i===hover);
      let dim=1;
      if(hasSel&&!inLin)dim=0.10;
      if(playSet&&inLin&&!playSet.has(i))dim=0.30;
      const sx=P[i*3],sy=P[i*3+1],pf=P[i*3+2];
      const r=nodeR(i)*(isFocus?1.6:1);
      const rgb=CURS[i];
      const a=dim*(0.55+0.45*Math.min(1,pf*pf));
      const lit=isFocus||(hasSel&&inLin&&(!playSet||playSet.has(i)));
      if(!lit&&morphT>=1){
        const R=r<8?Math.round(r*2)/2:Math.round(r);
        const off=R+2;
        ctx.globalAlpha=a;
        ctx.drawImage(sprite(rgb,R),sx-off,sy-off,off*2,off*2);
        ctx.globalAlpha=1;
        continue;
      }
      if(lit){
        ctx.shadowColor='rgb('+rgb+')';ctx.shadowBlur=isFocus?18:9;
      } else ctx.shadowBlur=0;
      ctx.fillStyle='rgba('+rgb+','+a+')';
      ctx.beginPath();ctx.arc(sx,sy,r,0,6.2832);ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(8,10,18,'+(0.5*dim)+')';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sx,sy,r,0,6.2832);ctx.stroke();
      if(isFocus){
        ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineWidth=1.6;
        ctx.beginPath();ctx.arc(sx,sy,r+2.5,0,6.2832);ctx.stroke();
      }
    }
  }

  const START=performance.now();
  let lastTs=START,drawAvg=8,halfRate=false,beat=0,lastAdj=START+2500;
  function frame(ts){
    if(!reduce) grow=Math.min(1.02,(ts-START)/2800*1.02);
    const dt=Math.min(64,ts-lastTs); lastTs=ts;
    if(morphT<1){
      morphT=Math.min(1,morphT+dt*0.00075);
      const e=morphT*morphT*(3-2*morphT);
      const toFlag=layoutMode===2;
      for(let i=0;i<N.length;i++){
        const n=N[i], d=destOf(n,ts);
        n.x=n._sx+(d[0]-n._sx)*e;
        n.z=n._sz+(d[1]-n._sz)*e;
        n.py=n._spy+(d[2]-n._spy)*e;
        const s=SNAP[i], g=toFlag?FLAGC[i]:BASE[i];
        CUR[i][0]=(s[0]+(g[0]-s[0])*e)|0;
        CUR[i][1]=(s[1]+(g[1]-s[1])*e)|0;
        CUR[i][2]=(s[2]+(g[2]-s[2])*e)|0;
        CURS[i]=CUR[i][0]+','+CUR[i][1]+','+CUR[i][2];
      }
    } else if(layoutMode===2){
      for(let i=0;i<N.length;i++)N[i].z=waveZ(N[i],ts);
    }
    if(layoutMode===2){
      // hold the camera still facing the flag; only the cloth itself moves
      if(!dragging&&rotYTarget===null&&selected<0){
        const home=Math.round(rotY/(2*Math.PI))*2*Math.PI;
        rotY+=(home-rotY)*Math.min(1,dt*0.0016);
      }
    } else if(spinEnabled&&hover<0&&selected<0&&!playing&&!dragging)rotY+=0.00018*dt;
    if(playing&&!playPaused){
      playClock+=dt;
      if(playClock>=playStep){
        playClock=0;
        if(playIdx<playOrder.length)setStep(playIdx+1);
        else{
          playHold+=playStep;
          if(playHold>1600)stopPlay();
        }
      }
    }
    if(rotYTarget!==null){
      let d=((rotYTarget-rotY+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
      rotY+=d*0.12;
      if(Math.abs(d)<0.008)rotYTarget=null;
    }
    if(tiltTarget!==null){tilt+=(tiltTarget-tilt)*0.12;if(Math.abs(tiltTarget-tilt)<0.004)tiltTarget=null;}
    if(zoomTarget!==null){zoom+=(zoomTarget-zoom)*0.12;if(Math.abs(zoomTarget-zoom)<0.01)zoomTarget=null;}
    if(panXT!==null){
      panX+=(panXT-panX)*0.15;panY+=(panYT-panY)*0.15;
      if(Math.abs(panXT-panX)<1&&Math.abs(panYT-panY)<1){panX=panXT;panY=panYT;panXT=null;panYT=null;}
    }
    if(fitActive)fitStep();
    // render governor: if a frame costs too much (weak devices), first draw
    // every other tick, then step the canvas resolution down until frames
    // are affordable; simulation stays dt-based so motion speed never changes
    beat^=1;
    if(!(halfRate&&beat)){
      const t0=performance.now();
      draw();
      const t1=performance.now();
      drawAvg+=((t1-t0)-drawAvg)*0.08;
      if(drawAvg>24)halfRate=true;else if(drawAvg<15)halfRate=false;
      if(t1-lastAdj>1500){
        if(drawAvg>30&&dprScale>0.5){
          dprScale=Math.max(0.5,dprScale-0.25);resize();lastAdj=t1;drawAvg=20;
        } else if(drawAvg<7&&dprScale<1){
          dprScale=Math.min(1,dprScale+0.25);resize();lastAdj=t1;drawAvg=12;
        }
      }
    }
    requestAnimationFrame(frame);
  }
  applyLang();
  window.addEventListener('resize',()=>{resize();});
  window._perf=()=>({drawAvg:+drawAvg.toFixed(2),halfRate,dpr:DPR,dprScale,sprites:SPRITES.size,coarse:COARSE});
  window._dbg=()=>{
    let py0=1e9,py1=-1e9,fp0=1e9,fp1=-1e9,x0=1e9,x1=-1e9,sy0=1e9,sy1=-1e9,sx0=1e9,sx1=-1e9;
    for(let i=0;i<N.length;i++){
      const n=N[i];
      if(n.py<py0)py0=n.py; if(n.py>py1)py1=n.py;
      if(n._fpy<fp0)fp0=n._fpy; if(n._fpy>fp1)fp1=n._fpy;
      if(n.x<x0)x0=n.x; if(n.x>x1)x1=n.x;
      if(!vis(i))continue;
      if(P[i*3]<sx0)sx0=P[i*3]; if(P[i*3]>sx1)sx1=P[i*3];
      if(P[i*3+1]<sy0)sy0=P[i*3+1]; if(P[i*3+1]>sy1)sy1=P[i*3+1];
    }
    return {rotY:+rotY.toFixed(3),tilt:+tilt.toFixed(3),zoom:+zoom.toFixed(3),
      panX:Math.round(panX),panY:Math.round(panY),morphT:+morphT.toFixed(3),layoutMode,
      pyRange:[Math.round(py0),Math.round(py1)],fpyRange:[Math.round(fp0),Math.round(fp1)],
      xRange:[Math.round(x0),Math.round(x1)],
      screenW:Math.round(sx1-sx0),screenH:Math.round(sy1-sy0)};
  };
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
